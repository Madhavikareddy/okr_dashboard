# Netlify configuration for Next.js 14 (App Router) + Supabase
# Docs: https://docs.netlify.com/integrations/frameworks/next-js/overview/

[build]
  command = "npm run build"
  publish = ".next"

# The official Next.js runtime — auto-installed by Netlify, but pinning it here
# ensures App Router, middleware, ISR and server components all work.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Default Node version for the build container
[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Optional: cleaner cache headers for the static `_next/static` assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
